<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-bg {
            background: radial-gradient(circle at 50% 50%, #131b2e 0%, #0b1326 100%);
            position: relative;
            overflow: hidden;
        }
        .ethereal-bg::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.05;
            pointer-events: none;
        }

            backdrop-filter: blur(20px);
            background-color: rgba(23, 31, 51, 0.6);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(0, 120, 212, 0.3);
            transition: all 0.3s ease;
        }

            box-shadow: 0 0 30px rgba(163, 201, 255, 0.5);

<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-6 ethereal-bg">

<main class="w-full max-w-[480px] z-10">

<div class="flex flex-col items-center space-y-4">
<div class="w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-[0_0_25px_rgba(0,120,212,0.4)]">

</div>
<div class="text-center">
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-on-surface" style="">
                        Jin's cloud service</h1>
</div>
</div>
<!-- Description -->
<p class="text-on-surface-variant text-center leading-relaxed font-normal px-4" style="">
                Sign in with your corporate account to provision and manage cloud infrastructure.
            </p>
<!-- SSO Action -->
<div class="w-full pt-4">
<button class="glow-button w-full flex items-center justify-center space-x-3 bg-gradient-to-r from-primary-container to-tertiary-container text-on-primary-container py-4 px-6 rounded-xl font-headline font-bold text-base tracking-tight" style="">
<svg class="w-5 h-5 fill-current" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
<path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"></path>
</svg>
<span class="" style="">Sign in with Microsoft Entra ID</span>
</button>
</div>
<!-- Additional Context / "The Slot" Visual Hint -->
<div class="w-full pt-4">
<div class="bg-surface-container-lowest/50 rounded-xl p-4 border-t border-white/5 flex items-center justify-center">
<div class="flex items-center space-x-3 opacity-60">
<span class="material-symbols-outlined text-primary text-sm" data-icon="verified_user" style="">verified_user</span>
<span class="text-[10px] font-label uppercase tracking-[0.2em] text-on-surface" style="">Secure Enterprise Provisioning</span>
</div>
</div>
</div>
</div>

<span class="material-symbols-outlined text-xs group-hover:translate-x-1 transition-transform" data-icon="arrow_forward" style="">arrow_forward</span>
</a>

<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px] -z-0 pointer-events-none"></div>
